version: 1
layout_reference: docs/plugin-layout.yaml
cli_marketplace_manifest: .github/plugin/marketplace.json
plugins:
  - name: martix-dotnet-library
    version: 0.1.0
    phase: 1
    plugin_path: src/plugins/martix-dotnet-library
    metadata_path: src/plugins/martix-dotnet-library/plugin.yaml
    cli_manifest_path: src/plugins/martix-dotnet-library/plugin.json
    install:
      source: local-marketplace
      marketplace_root: .
  - name: martix-webapi
    version: 0.1.0
    phase: 2
    plugin_path: src/plugins/martix-webapi
    metadata_path: src/plugins/martix-webapi/plugin.yaml
    cli_manifest_path: src/plugins/martix-webapi/plugin.json
    install:
      source: local-marketplace
      marketplace_root: .
  - name: martix-csharp
    version: 0.1.0
    phase: 3
    plugin_path: src/plugins/martix-csharp
    metadata_path: src/plugins/martix-csharp/plugin.yaml
    cli_manifest_path: src/plugins/martix-csharp/plugin.json
    install:
      source: local-marketplace
      marketplace_root: .
